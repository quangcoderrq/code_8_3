<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách Ảnh Kỷ Niệm 8/3 ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
        <div class="gift-container">
            <div class="heart-pulse">❤️</div>
            <p class="instruction">Chạm vào trái tim để mở quà</p>
        </div>
    </div>

    <!-- Main Flipbook Screen -->
    <div id="main-screen" class="screen hidden">
        <div id="falling-elements"></div>

        <!-- Floating hearts instead of cats -->
        <div id="hearts-container"></div>

        <div class="book-container">
            <div class="book">
                <!-- Sheet 1: Cover & First Memory -->
                <div class="sheet" id="sheet-1">
                    <div class="side front cover">
                        <div class="page-content">
                            <h1 class="title">Our Memories</h1>
                            <p class="subtitle">Happy Women's Day</p>
                            <div class="click-hint">Bấm vào mép phải để mở sách 👉</div>
                        </div>
                    </div>
                    <div class="side back img-page">
                        <img src="imgs/8c2d747f-e17e-4e81-ab19-98821967b247.jpg" alt="Memory 1">
                    </div>
                </div>

                <!-- Sheet 2: First Message & Second Memory -->
                <div class="sheet" id="sheet-2">
                    <div class="side front text-page">
                        <div class="page-content">
                            <p class="typewriter-text"
                                data-text="Mỗi phút giây bên em đều là một kỷ niệm vô giá. Chúc mừng mùng 8 tháng 3 người phụ nữ tuyệt vời nhất! ❤️">
                            </p>
                        </div>
                    </div>
                    <div class="side back img-page">
                        <img src="imgs/bcac3511-3d5a-4068-aead-f8d90f4917ab.jpg" alt="Memory 2">
                    </div>
                </div>

                <!-- Sheet 3: Second Message & Final Page -->
                <div class="sheet" id="sheet-3">
                    <div class="side front text-page">
                        <div class="page-content">
                            <p class="typewriter-text"
                                data-text="Hãy luôn nở nụ cười thật tươi nhé, vì nụ cười của em chính là món quà đắt giá nhất đối với anh. Mãi yêu em! 🌹">
                            </p>
                        </div>
                    </div>
                    <div class="side back text-page center-content">
                        <h2 class="title ending">HAPPY 8/3!</h2>
                        <div class="signature">With love 🌷</div>
                    </div>
                </div>

                <!-- Sheet 4: Back Cover -->
                <div class="sheet" id="sheet-4">
                    <div class="side front text-page center-content">
                        <div class="heart-pulse" style="font-size: 50px;">❤️</div>
                    </div>
                    <div class="side back cover center-content">
                        <h1 class="title" style="margin-top: 0; font-size: 2.5rem;">The End</h1>
                        <p class="subtitle">Hy vọng em thích món quà này!</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Navigation controls (moved outside book container) -->
        <div class="controls">
            <button id="prev-btn" class="nav-btn hidden">Trang trước</button>
            <button id="next-btn" class="nav-btn">Trang sau</button>
        </div>

        <iframe id="bg-music" width="0" height="0" src="" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <script src="script.js?v=2"></script>
</body>

</html>
