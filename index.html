<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi một nửa thế giới ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
        <div class="gift-container">
            <div class="heart-pulse">❤️</div>
            <p class="instruction">Chạm để mở quà</p>
        </div>
    </div>

    <!-- Main Greeting Screen -->
    <div id="main-screen" class="screen hidden">
        <div id="falling-elements"></div>
        <div class="card">
            <h1 class="title">Happy Women's Day</h1>
            <div class="message-container">
                <p id="typewriter-text"></p>
            </div>
            <div class="signature">Chúc bạn 8/3 rạng rỡ! 🌹</div>
        </div>
        <!-- Thêm một thẻ audio rỗng với link nhạc placeholder từ nguồn miễn phí -->
        <audio id="bg-music" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
